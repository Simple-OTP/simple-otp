name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    # Required to create/upload the GitHub Release
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev cmake clang pkg-config

      - name: Disable Flutter analytics
        run: flutter --disable-analytics

      - name: Validate (deps, codegen, lint, tests)
        run: make

      - name: Build Linux (release)
        run: flutter build linux --release

      - name: Build Android APK (release, split per ABI)
        run: flutter build apk --release --split-per-abi

      - name: Package Linux bundle
        run: |
          tar -czf simple-otp-linux-x64.tar.gz \
            -C build/linux/x64/release/bundle .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            simple-otp-linux-x64.tar.gz
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
